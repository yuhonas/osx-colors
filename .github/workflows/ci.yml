name: ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
    - 'README.md'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: make setup
    - name: Run linting & tests
      run:  make test
